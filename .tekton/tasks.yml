apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: cleanup
spec:
  description: Task to cleanup the workspace
  workspaces:
    - name: source
  steps:
    - name: cleanup
      image: alpine:latest
      script: |
        echo "Cleaning up workspace..."
        rm -rf $(workspaces.source.path)/*

---

apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: nose-test
spec:
  description: Task to run unit tests with nose
  workspaces:
    - name: source
  steps:
    - name: nosetests
      image: python:3.9-slim
      workingDir: $(workspaces.source.path)
      script: |
        pip install -r requirements.txt
        nosetests -v --with-spec --spec-color --with-coverage --cover-package=app